# Continuo -- continuo.cloud landing page
#
# Deploys the static site under `web/` to Cloudflare Workers + Static Assets
# (Cloudflare's recommended path for static sites as of 2026; Pages classic
# is now legacy).
#
# Workflow:
#   wrangler deploy                      # ships to *.workers.dev URL
#   curl https://<sub>.workers.dev       # immediate verification
#   # then bind continuo.cloud as custom domain via Cloudflare dashboard
#   # then point IONOS DNS at Cloudflare nameservers OR add CNAME
#
# This file lives in the Continuo repo root because the deploy needs
# access to the `web/` directory. The repo's .gitignore does not
# need any wrangler-specific entries beyond the existing Python ones.

name = "continuo-cloud-landing"
compatibility_date = "2026-04-27"

# Keep the *.workers.dev URL active for immediate verification + as a backup
# while custom-domain DNS migration is in flight.
workers_dev = true

[assets]
directory = "./web"
not_found_handling = "single-page-application"

# Custom domain binding -- COMMENTED OUT until IONOS DNS migration completes.
#
# Cloudflare requires continuo.cloud's DNS to land on Cloudflare nameservers
# before it will bind the hostname to a worker. Today (2026-04-27) the
# domain still resolves via IONOS (74.208.236.229) so the bind fails with
# "Hostname 'continuo.cloud' already has externally managed DNS records".
#
# The unblock is on Ry's side and goes:
#   1. Cloudflare dashboard -> Websites -> Add a site -> continuo.cloud
#   2. Cloudflare scans the IONOS records, hands back Cloudflare nameservers
#      (something like `xxx.ns.cloudflare.com` and `yyy.ns.cloudflare.com`)
#   3. IONOS -> Domain settings -> change nameservers to those
#   4. Wait for propagation (1-24 hrs; usually <1)
#   5. Uncomment the [[routes]] block below
#   6. `wrangler deploy` -- binding succeeds, traffic flows
#
# [[routes]]
# pattern = "continuo.cloud"
# custom_domain = true
