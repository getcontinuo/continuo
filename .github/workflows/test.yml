name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Let us manually trigger a re-run from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      # Don't cancel all shards when one fails -- we want to see
      # e.g. a Windows-only Unicode bug without losing Ubuntu results.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llama-cpp]"

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run smoke test (orchestrator against bundled example data)
        working-directory: core
        run: |
          python orchestrator.py

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        # v0.0.x is pre-alpha; lint warnings are reported but don't fail the build
        # until the codebase stabilizes. Tighten to `ruff check --exit-non-zero`
        # once there's a coherent lint baseline to hold to.
        run: |
          ruff check . || echo "::warning::ruff reported issues (non-fatal in v0.0.x)"
