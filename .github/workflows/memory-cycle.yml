name: memory-cycle

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-memory-cycle:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[server]" pyyaml jsonschema

      - name: Bootstrap memory directories
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/bootstrap-continuo-mcp.ps1 -WorkspaceRoot "."

      - name: Run memory cycle
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/run_memory_cycle.ps1 -WorkspaceRoot "." -SchemaPath ".\spec\L5_schema.json"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-cycle-reports
          path: .cursor/memory/reports/*.json
